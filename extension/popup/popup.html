<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Autimik</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 300px;
      max-height: 580px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      background: #0f172a;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 0.5px;
    }
    .header-actions { display: flex; gap: 8px; }
    .btn-clear {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    .btn-clear:hover { border-color: #ef4444; color: #ef4444; }

    .upload-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .drop-zone {
      width: 100%;
      border: 2px dashed #374151;
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.05);
    }
    .drop-zone-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }
    .drop-zone-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .drop-zone-sub {
      font-size: 12px;
      color: #64748b;
    }

    .inventory-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .search-bar {
      padding: 8px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .search-bar input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    .search-bar input:focus { border-color: #60a5fa; }
    .search-bar input::placeholder { color: #64748b; }

    .vehicle-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }
    .vehicle-list::-webkit-scrollbar { width: 4px; }
    .vehicle-list::-webkit-scrollbar-track { background: transparent; }
    .vehicle-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .vehicle-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 8px;
      position: relative;
      transition: opacity 0.2s;
    }
    .vehicle-card.listed { opacity: 0.5; }
    .vehicle-thumb {
      width: 56px;
      height: 42px;
      border-radius: 4px;
      object-fit: cover;
      background: #334155;
      flex-shrink: 0;
    }
    .vehicle-info {
      flex: 1;
      min-width: 0;
    }
    .vehicle-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vehicle-meta {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .vehicle-meta span { margin-right: 8px; }

    .listed-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: #22c55e;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .btn-list {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-list:hover { background: #2563eb; }
    .btn-list:disabled { background: #334155; color: #64748b; cursor: default; }

    .wrong-page {
      padding: 20px;
      text-align: center;
      background: #1c1917;
      border: 1px solid #78350f;
      border-radius: 8px;
      margin: 12px;
    }
    .wrong-page-icon { font-size: 28px; margin-bottom: 8px; display: block; }
    .wrong-page p {
      font-size: 12px;
      color: #fbbf24;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .wrong-page a {
      color: #60a5fa;
      text-decoration: underline;
      cursor: pointer;
      font-size: 12px;
    }

    .status-bar {
      padding: 8px 16px;
      border-top: 1px solid #1e293b;
      font-size: 11px;
      color: #64748b;
      text-align: center;
      background: #0f172a;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      z-index: 1000;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #166534; color: #bbf7d0; }
    .toast.error { background: #7f1d1d; color: #fecaca; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Autimik</h1>
    <div class="header-actions">
      <button class="btn-clear hidden" id="btnClear">Clear</button>
    </div>
  </div>

  <div id="uploadView" class="upload-view">
    <div class="drop-zone" id="dropZone">
      <span class="drop-zone-icon">&#128206;</span>
      <div class="drop-zone-title">Drop your CSV here</div>
      <div class="drop-zone-sub">or click to browse</div>
    </div>
    <input type="file" id="fileInput" accept=".csv" style="display:none">
  </div>

  <div id="inventoryView" class="inventory-view hidden">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search vehicles...">
    </div>
    <div class="vehicle-list" id="vehicleList"></div>
  </div>

  <div class="status-bar" id="statusBar">Ready</div>
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
